<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线加解密工具</title>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
    <script>
        // 在页面渲染前检测浏览器主题和语言
        (function() {
            // 主题检测
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.documentElement.setAttribute('data-theme', 'light');
            }

            // 语言检测
            const savedLang = localStorage.getItem('language');
            let lang;
            if (savedLang) {
                lang = savedLang;
            } else {
                const browserLang = navigator.language || navigator.userLanguage;
                lang = browserLang.startsWith('zh') ? 'zh' : 'en';
            }
            document.documentElement.setAttribute('data-lang', lang);
            // 设置全局语言变量，供后续使用
            window.__initialLang = lang;
        })();
    </script>
    <style>
        /* CSS 变量 - 暗色主题（默认） */
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-primary: rgba(255, 255, 255, 0.05);
            --bg-secondary: rgba(0, 0, 0, 0.3);
            --bg-tertiary: rgba(0, 0, 0, 0.4);
            --bg-input: rgba(0, 0, 0, 0.3);
            --text-primary: #fff;
            --text-secondary: #e0e0e0;
            --text-muted: #888;
            --text-label: #ccc;
            --accent-color: #00d4ff;
            --accent-secondary: #7b2cbf;
            --border-color: rgba(255, 255, 255, 0.1);
            --border-hover: #00d4ff;
            --btn-secondary-bg: rgba(255, 255, 255, 0.1);
            --btn-secondary-border: rgba(255, 255, 255, 0.2);
            --select-option-bg: #1a1a2e;
            --error-color: #ff6b6b;
            --info-bg: rgba(123, 44, 191, 0.1);
            --warning-bg: rgba(255, 107, 107, 0.1);
            --key-info-bg: rgba(0, 212, 255, 0.1);
            --toast-bg: #00d4ff;
            --toast-color: #000;
        }

        /* 亮色主题 */
        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 50%, #d4dbe8 100%);
            --bg-primary: rgba(255, 255, 255, 0.8);
            --bg-secondary: rgba(0, 0, 0, 0.05);
            --bg-tertiary: rgba(0, 0, 0, 0.08);
            --bg-input: rgba(255, 255, 255, 0.9);
            --text-primary: #1a1a2e;
            --text-secondary: #2d3748;
            --text-muted: #718096;
            --text-label: #4a5568;
            --accent-color: #0099cc;
            --accent-secondary: #7b2cbf;
            --border-color: rgba(0, 0, 0, 0.15);
            --border-hover: #0099cc;
            --btn-secondary-bg: rgba(0, 0, 0, 0.08);
            --btn-secondary-border: rgba(0, 0, 0, 0.15);
            --select-option-bg: #ffffff;
            --error-color: #e53e3e;
            --info-bg: rgba(123, 44, 191, 0.1);
            --warning-bg: rgba(229, 62, 62, 0.1);
            --key-info-bg: rgba(0, 153, 204, 0.1);
            --toast-bg: #0099cc;
            --toast-color: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-secondary);
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--accent-color), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
        }

        .header-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .control-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
            color: var(--text-secondary);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            border-color: var(--accent-color);
        }

        @media (max-width: 900px) {
            .header-controls {
                position: static;
                margin-bottom: 15px;
                justify-content: center;
            }
            .control-btn {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }
        }

        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static !important;
            }
            .header-controls {
                position: static;
                margin-bottom: 15px;
                justify-content: center;
            }
        }

        .sidebar {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 20px;
            max-height: calc(100vh - 60px);
            overflow-y: auto;
            position: sticky;
            top: 20px;
            transition: background 0.3s ease;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }

        .category {
            margin-bottom: 20px;
        }

        .category-header {
            color: var(--accent-color);
            font-size: 1rem;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }

        .category-header:hover {
            color: var(--text-primary);
        }

        .category-arrow {
            transition: transform 0.3s ease;
            font-size: 0.8rem;
        }

        .category.collapsed .category-arrow {
            transform: rotate(-90deg);
        }

        .category-content {
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 1000px;
        }

        .category.collapsed .category-content {
            max-height: 0;
        }

        .algorithm-btn {
            display: block;
            width: 100%;
            padding: 10px 15px;
            margin-bottom: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 0.95rem;
        }

        .algorithm-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-color);
        }

        .algorithm-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(123, 44, 191, 0.15));
            border-color: var(--accent-color);
            color: var(--text-primary);
        }

        .workspace {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 25px;
            transition: background 0.3s ease;
        }

        .workspace h2 {
            color: var(--text-primary);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .workspace h2 .badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            background: var(--accent-secondary);
            border-radius: 4px;
            color: #fff;
        }

        .workspace .description {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent-color);
            font-size: 1rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--border-hover);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group select option {
            background: var(--select-option-bg);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            accent-color: var(--accent-color);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), #0099cc);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text-primary);
            border: 1px solid var(--btn-secondary-border);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
        }

        .output-section {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .output-section h4 {
            color: var(--accent-color);
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .output-box {
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 15px;
            word-break: break-all;
            min-height: 60px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .output-box.error {
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        .copy-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .info-box {
            background: var(--info-bg);
            border-left: 3px solid var(--accent-secondary);
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
            color: var(--text-label);
        }

        .warning-box {
            background: var(--warning-bg);
            border-left: 3px solid var(--error-color);
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
            color: var(--text-label);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--toast-bg);
            color: var(--toast-color);
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 10px;
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        footer p {
            margin: 3px 0;
        }

        .footer-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 3px 0;
        }

        .footer-divider {
            margin: 0 10px;
            opacity: 0.5;
        }

        .github-icon {
            fill: var(--accent-color);
            transition: fill 0.3s ease;
        }

        .footer-main:hover .github-icon {
            fill: var(--text-primary);
        }

        .mode-toggle {
            display: flex;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .mode-toggle button,
        .mode-btn {
            flex: 1;
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .mode-toggle button.active,
        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent-color), #0099cc);
            color: #fff;
        }

        /* 输入类型切换 */
        .input-type-toggle {
            display: flex;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 15px;
        }

        .input-type-btn {
            flex: 1;
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .input-type-btn.active {
            background: linear-gradient(135deg, var(--accent-color), #0099cc);
            color: #fff;
        }

        /* 文件拖拽区域 */
        .file-drop-zone {
            border: 2px dashed var(--text-muted);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
            margin-bottom: 15px;
        }

        .file-drop-zone:hover,
        .file-drop-zone.dragover {
            border-color: var(--accent-color);
            background: var(--bg-tertiary);
        }

        .file-drop-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .file-icon {
            color: var(--text-muted);
        }

        .file-drop-zone:hover .file-icon,
        .file-drop-zone.dragover .file-icon {
            color: var(--accent-color);
        }

        .file-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 10px 15px;
            margin-top: 15px;
        }

        .file-info span {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        #fileName {
            font-weight: 500;
            color: var(--accent-color);
        }

        #fileSize {
            color: var(--text-muted);
        }

        .btn-clear-file {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
            transition: color 0.3s ease;
        }

        .btn-clear-file:hover {
            color: #ff6b6b;
        }

        .advanced-section {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .advanced-section h4 {
            color: var(--accent-color);
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .advanced-section h4::before {
            content: '⚙️';
        }

        .key-info {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .key-info span {
            padding: 4px 8px;
            background: var(--key-info-bg);
            border-radius: 4px;
        }

        .tabs {
            display: flex;
            background: var(--bg-secondary);
            border-radius: 8px 8px 0 0;
            margin-bottom: -1px;
        }

        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .collapsible {
            cursor: pointer;
            user-select: none;
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .collapsible-content.open {
            max-height: 500px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-controls">
                <button class="control-btn" onclick="toggleLanguage()" title="Language"><span id="lang-icon">EN</span></button>
                <button class="control-btn" onclick="toggleTheme()" title="Theme"><span id="theme-icon">🌙</span></button>
            </div>
            <h1 id="pageTitle">在线加解密工具</h1>
            <p id="pageSubtitle">基于 Crypto.js 的纯前端加密解密工具，数据不会上传服务器</p>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="category collapsed">
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span id="catSymmetric">对称加密</span>
                        <span class="category-arrow">▼</span>
                    </div>
                    <div class="category-content">
                        <button class="algorithm-btn active" data-algo="AES">AES</button>
                        <button class="algorithm-btn" data-algo="DES">DES</button>
                        <button class="algorithm-btn" data-algo="TripleDES">TripleDES</button>
                        <button class="algorithm-btn" data-algo="Blowfish">Blowfish</button>
                        <button class="algorithm-btn" data-algo="Rabbit">Rabbit</button>
                        <button class="algorithm-btn" data-algo="RC4">RC4</button>
                        <button class="algorithm-btn" data-algo="RC4Drop">RC4Drop</button>
                    </div>
                </div>
                <div class="category collapsed">
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span id="catAsymmetric">公钥加密</span>
                        <span class="category-arrow">▼</span>
                    </div>
                    <div class="category-content">
                        <button class="algorithm-btn" data-algo="RSA">RSA</button>
                        <button class="algorithm-btn" data-algo="ECDSA">ECDSA</button>
                        <button class="algorithm-btn" data-algo="ECDH">ECDH</button>
                        <button class="algorithm-btn" data-algo="Ed25519">Ed25519</button>
                    </div>
                </div>
                <div class="category collapsed">
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span id="catHash">哈希算法</span>
                        <span class="category-arrow">▼</span>
                    </div>
                    <div class="category-content">
                        <button class="algorithm-btn hash-all-btn" id="hashAllBtn">All</button>
                        <button class="algorithm-btn" data-algo="MD5">MD5</button>
                        <button class="algorithm-btn" data-algo="SHA1">SHA-1</button>
                        <button class="algorithm-btn" data-algo="SHA224">SHA-224</button>
                        <button class="algorithm-btn" data-algo="SHA256">SHA-256</button>
                        <button class="algorithm-btn" data-algo="SHA384">SHA-384</button>
                        <button class="algorithm-btn" data-algo="SHA512">SHA-512</button>
                        <button class="algorithm-btn" data-algo="SHA3">SHA-3</button>
                        <button class="algorithm-btn" data-algo="RIPEMD160">RIPEMD-160</button>
                    </div>
                </div>
                <div class="category collapsed">
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span id="catHMAC">HMAC</span>
                        <span class="category-arrow">▼</span>
                    </div>
                    <div class="category-content">
                        <button class="algorithm-btn" data-algo="HMAC">HMAC</button>
                    </div>
                </div>
                <div class="category collapsed">
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span id="catEncoding">编码工具</span>
                        <span class="category-arrow">▼</span>
                    </div>
                    <div class="category-content">
                        <button class="algorithm-btn" data-algo="UniversalConvert" id="btnUniversalConvert">综合转换</button>
                        <button class="algorithm-btn" data-algo="Base64">Base64</button>
                        <button class="algorithm-btn" data-algo="Hex" id="btnHexEncode">Hex 编码</button>
                        <button class="algorithm-btn" data-algo="Latin1">Latin1</button>
                        <button class="algorithm-btn" data-algo="Utf8" id="btnUtf8Encode">UTF-8 编码</button>
                    </div>
                </div>
                <div class="category collapsed">
                    <div class="category-header" onclick="toggleCategory(this)">
                        <span id="catKDF">密钥派生</span>
                        <span class="category-arrow">▼</span>
                    </div>
                    <div class="category-content">
                        <button class="algorithm-btn" data-algo="PBKDF2">PBKDF2</button>
                        <button class="algorithm-btn" data-algo="EvpKDF">EvpKDF</button>
                    </div>
                </div>
            </aside>

            <main class="workspace" id="workspace">
                <!-- 内容由 JavaScript 动态生成 -->
            </main>
        </div>

        <footer>
            <div class="footer-main">
                <span>© 2026</span>

        // 切换分类折叠
        function toggleCategory(header) {
            const category = header.parentElement;
            category.classList.toggle('collapsed');
        }

        // 切换折叠
        function toggleCollapsible(el) {
            const content = el.nextElementSibling;
            content.classList.toggle('open');
        }

        // 更新 IV 显示
        function updateIvRequirement() {
            const modeSelect = document.getElementById('cipherMode');
            const ivGroup = document.getElementById('ivGroup');
            if (!modeSelect || !ivGroup) return;

            const mode = modeSelect.value;
            const needsIv = cipherModes[mode]?.needsIv;

            if (needsIv) {
                ivGroup.style.display = 'flex';
            } else {
                ivGroup.style.display = 'none';
            }
        }

        // 更新密钥信息显示
        function updateKeyInfo() {
            const keyInput = document.getElementById('keyInput');
            const keyFormatSelect = document.getElementById('keyFormat');
            const keySizeSelect = document.getElementById('keySize');
            const keyInfo = document.getElementById('keyInfo');

            if (!keyInfo) return;

            const format = keyFormatSelect?.value || 'Utf8';
            const size = keySizeSelect?.value || 256;
            const key = keyInput?.value || '';

            const formatName = t('format' + format) || keyFormats[format].name;
            let infoHtml = `<span>${t('infoFormat')}: ${formatName}</span><span>${t('infoBits')}: ${size}</span>`;

            if (key) {
                try {
                    const keyBytes = keyFormats[format].enc.parse(key);
                    infoHtml += `<span>${t('infoActualLength')}: ${keyBytes.sigBytes * 8} ${t('infoBits')}</span>`;
                    if (keyBytes.sigBytes * 8 !== parseInt(size)) {
                        infoHtml += `<span style="color: #ff6b6b;">${t('infoMismatch')}</span>`;
                    }
                } catch (e) {
                    infoHtml += `<span style="color: #ff6b6b;">${t('infoParseError')}</span>`;
                }
            }

            keyInfo.innerHTML = infoHtml;
        }

        // 更新IV信息显示
        function updateIvInfo() {
            const ivInput = document.getElementById('ivInput');
            const ivFormatSelect = document.getElementById('ivFormat');
            const ivInfo = document.getElementById('ivInfo');

            if (!ivInfo) return;

            const format = ivFormatSelect?.value || 'Utf8';
            const iv = ivInput?.value || '';

            const formatName = t('format' + format) || keyFormats[format].name;
            let infoHtml = `<span>${t('infoFormat')}: ${formatName}</span>`;

            if (iv) {
                try {
                    const ivBytes = keyFormats[format].enc.parse(iv);
                    infoHtml += `<span>${t('infoActualLength')}: ${ivBytes.sigBytes * 8} ${t('infoBits')}</span>`;
                    // IV通常需要16字节（128位）用于AES
                    if (ivBytes.sigBytes !== 16) {
                        infoHtml += `<span style="color: #ff6b6b;">${t('infoRecommend128')}</span>`;
                    }
                } catch (e) {
                    infoHtml += `<span style="color: #ff6b6b;">${t('infoParseError')}</span>`;
                }
            }

            ivInfo.innerHTML = infoHtml;
        }

        // 监听密钥和IV输入
        document.addEventListener('input', (e) => {
            if (e.target.id === 'keyInput') {
                updateKeyInfo();
            } else if (e.target.id === 'ivInput') {
                updateIvInfo();
            }
        });

        // 保存当前表单数据
        function saveFormData() {
            const cache = {};

            try {
                // 保存所有输入框和选择框的值
                const inputs = document.querySelectorAll('#workspace input, #workspace textarea, #workspace select');
                if (inputs) {
                    inputs.forEach(el => {
                        if (el && el.id) {
                            cache[el.id] = el.value;
                        }
                    });
                }

                // 保存复选框状态
                const checkboxes = document.querySelectorAll('#workspace input[type="checkbox"]');
                if (checkboxes) {
                    checkboxes.forEach(el => {
                        if (el && el.id) {
                            cache[el.id] = el.checked;
                        }
                    });
                }

                formDataCache[getCacheKey()] = cache;
            } catch (e) {
                console.error('saveFormData error:', e);
            }
        }

        // 恢复表单数据
        function restoreFormData() {
            const cache = formDataCache[getCacheKey()];
            if (!cache) return;

            // 恢复所有输入框和选择框的值
            Object.keys(cache).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (el.type === 'checkbox') {
                        el.checked = cache[id];
                    } else {
                        el.value = cache[id];
                    }
                }
            });

            // 更新相关显示
            updateKeyInfo();
            updateIvRequirement();
            updateIvInfo();
        }

        // 切换模式

        // 生成随机密钥
        function generateKey() {
            const keySizeSelect = document.getElementById('keySize');
            const keyFormatSelect = document.getElementById('keyFormat');
            const keyInput = document.getElementById('keyInput');

            const size = parseInt(keySizeSelect?.value || 256);
            const format = keyFormatSelect?.value || 'Utf8';

            const keyBytes = CryptoJS.lib.WordArray.random(size / 8);

            if (format === 'Hex') {
                keyInput.value = keyBytes.toString(CryptoJS.enc.Hex);
            } else if (format === 'Base64') {
                keyInput.value = keyBytes.toString(CryptoJS.enc.Base64);
            } else {
                // 对于字符串格式，使用 Base64 格式并自动切换格式选择框
                keyInput.value = keyBytes.toString(CryptoJS.enc.Base64);
                keyFormatSelect.value = 'Base64';
            }

            // 也生成 IV
            const ivInput = document.getElementById('ivInput');
            const ivFormatSelect = document.getElementById('ivFormat');
            if (ivInput && ivFormatSelect) {
                const ivBytes = CryptoJS.lib.WordArray.random(16);
                const ivFormat = ivFormatSelect.value;
                if (ivFormat === 'Hex') {
                    ivInput.value = ivBytes.toString(CryptoJS.enc.Hex);
                } else if (ivFormat === 'Base64') {
                    ivInput.value = ivBytes.toString(CryptoJS.enc.Base64);
                } else {
                    // 对于字符串格式，使用 Base64 格式并自动切换格式选择框
                    ivInput.value = ivBytes.toString(CryptoJS.enc.Base64);
                    ivFormatSelect.value = 'Base64';
                }
            }

            updateKeyInfo();
            updateIvInfo();
            showToast('已生成随机密钥');
        }

        // 处理加密/解密/哈希
        async function process() {
            try {
                const algo = algorithms[currentAlgo];
                const inputTextEl = document.getElementById('inputText');
                const outputBox = document.getElementById('outputBox');

                if (!outputBox) {
                    alert('找不到输出元素');
                    return;
                }

                // 检查是否是文件输入模式
                if (algo.supportsFile && currentInputType === 'file') {
                    if (!selectedFile) {
                        outputBox.textContent = t('hashSelectFile');
                        outputBox.classList.add('error');
                        return;
                    }

                    outputBox.classList.remove('error');
                    outputBox.textContent = t('hashCalculating');

                    try {
                        const hashHex = await calculateFileHash(selectedFile, currentAlgo);
                        const result = `${t('hashFileResult')}:\n${hashHex}\n\n${t('hashFileName')}: ${selectedFile.name}\n${t('hashFileSize')}: ${formatFileSize(selectedFile.size)}\n${t('hashLength')}: ${hashHex.length * 4} ${t('infoBits')} (${hashHex.length} ${t('infoChars')})`;
                        outputBox.textContent = result;
                        outputBox.classList.remove('error');
                    } catch (err) {
                        outputBox.textContent = '错误: ' + err.message;
                        outputBox.classList.add('error');
                    }
                    return;
                }

                if (!inputTextEl) {
                    alert('找不到输入元素');
                    return;
                }

                const inputText = inputTextEl.value;

                if (!inputText.trim()) {
                    outputBox.textContent = '请输入文本';
                    outputBox.classList.add('error');
                    return;
                }

                outputBox.classList.remove('error');

                let result;

                if (algo.encodeFunc && currentMode === 'encrypt') {
                    result = algo.encodeFunc(inputText);
                } else if (algo.decodeFunc && currentMode === 'decrypt') {
                    result = algo.decodeFunc(inputText);
                } else if (['AES', 'DES', 'TripleDES', 'Blowfish', 'Rabbit', 'RC4', 'RC4Drop'].includes(currentAlgo)) {
                    result = processSymmetric(inputText, algo);
                } else if (['MD5', 'SHA1', 'SHA224', 'SHA256', 'SHA384', 'SHA512', 'SHA3', 'RIPEMD160'].includes(currentAlgo)) {
                    result = processHash(inputText);
                } else if (currentAlgo === 'HMAC') {
                    result = processHMAC(inputText);
                } else if (currentAlgo === 'PBKDF2') {
                    result = processPBKDF2();
                } else if (currentAlgo === 'EvpKDF') {
                    result = processEvpKDF();
                } else if (currentAlgo === 'UniversalConvert') {
                    result = processUniversalConvert(inputText);
                } else if (currentAlgo === 'RSA') {
                    result = await processRSA(inputText);
                } else if (currentAlgo === 'ECDSA') {
                    result = await processECDSA(inputText);
                } else if (currentAlgo === 'ECDH') {
                    result = await processECDH(inputText);
                } else if (currentAlgo === 'Ed25519') {
                    result = await processEd25519(inputText);
                }

                outputBox.textContent = result;
            } catch (e) {
                console.error('process error:', e);
                const outputBox = document.getElementById('outputBox');
                if (outputBox) {
                    outputBox.textContent = '错误: ' + e.message;
                    outputBox.classList.add('error');
                }
            }
        }

        // 综合转换处理
        function processUniversalConvert(inputText) {
            // 解析结果
            let bytes = null;
            let detectedFormat = '';
            let formatDetail = '';

            // 辅助函数：将字节数组转换为 CryptoJS WordArray
            function byteArrayToWordArray(byteArray) {
                const words = [];
                for (let i = 0; i < byteArray.length; i += 4) {
                    words.push(
                        (byteArray[i] << 24) |
                        ((byteArray[i + 1] || 0) << 16) |
                        ((byteArray[i + 2] || 0) << 8) |
                        (byteArray[i + 3] || 0)
                    );
                }
                const wordArray = CryptoJS.lib.WordArray.create(words);
                wordArray.sigBytes = byteArray.length;
                return wordArray;
            }

            // 1. 尝试检测 C-Array 格式: unsigned char xxx[] = { 0x55, 0x31, 0xD2 };
            const cArrayMatch = inputText.match(/unsigned\s+char\s+\w*\s*\[\s*\]\s*=\s*\{([\s\S]*?)\}/i);
            if (cArrayMatch) {
                try {
                    const hexValues = cArrayMatch[1].match(/0x[0-9a-fA-F]{2}/g);
                    if (hexValues) {
                        const byteArray = hexValues.map(h => parseInt(h, 16));
                        bytes = byteArrayToWordArray(byteArray);
                        detectedFormat = 'C-Array';
                        formatDetail = `unsigned char[${byteArray.length}]`;
                    }
                } catch (e) {}
            }

            // 2. 尝试检测 Python 列表格式: xxx = [ 0x55, 0x31, 0xD2 ]
            if (!bytes) {
                const pythonMatch = inputText.match(/\w*\s*=\s*\[([\s\S]*?)\]/);
                if (pythonMatch) {
                    try {
                        const hexValues = pythonMatch[1].match(/0x[0-9a-fA-F]{2}/g);
                        if (hexValues) {
                            const byteArray = hexValues.map(h => parseInt(h, 16));
                            bytes = byteArrayToWordArray(byteArray);
                            detectedFormat = 'Python List';
                            formatDetail = `list[${byteArray.length}]`;
                        }
                    } catch (e) {}
                }
            }

            // 3. 尝试检测 Inline 格式: \x55\x31\xD2
            if (!bytes) {
                const inlineMatch = inputText.match(/^(?:\\x[0-9a-fA-F]{2})+$/);
                if (inlineMatch) {
                    try {
                        const hexValues = inputText.match(/\\x([0-9a-fA-F]{2})/g);
                        if (hexValues) {
                            const byteArray = hexValues.map(h => parseInt(h.slice(2), 16));
                            bytes = byteArrayToWordArray(byteArray);
                            detectedFormat = 'Inline';
                            formatDetail = `${byteArray.length} bytes`;
                        }
                    } catch (e) {}
                }
            }

            // 4. 尝试检测 Hex 格式
            if (!bytes) {
                const hexOnly = inputText.replace(/[\s\n\r]/g, '');
                if (/^[0-9a-fA-F]+$/.test(hexOnly) && hexOnly.length % 2 === 0 && hexOnly.length >= 2) {
                    try {
                        bytes = CryptoJS.enc.Hex.parse(hexOnly);
                        detectedFormat = 'Hex';
                        formatDetail = `${hexOnly.length / 2} bytes`;
                    } catch (e) {}
                }
            }

            // 5. 尝试检测 Base64 格式
            if (!bytes) {
                const base64Only = inputText.replace(/[\s\n\r]/g, '');
                if (/^[A-Za-z0-9+/]+=*$/.test(base64Only) && base64Only.length >= 4) {
                    try {
                        bytes = CryptoJS.enc.Base64.parse(base64Only);
                        detectedFormat = 'Base64';
                        formatDetail = `${bytes.sigBytes} bytes`;
                    } catch (e) {}
                }
            }

            // 6. 尝试作为 UTF-8 字符串
            if (!bytes) {
                try {
                    bytes = CryptoJS.enc.Utf8.parse(inputText);
                    detectedFormat = 'UTF-8 字符串';
                    formatDetail = `${bytes.sigBytes} bytes`;
                } catch (e) {}
            }

            if (!bytes || bytes.sigBytes === 0) {
                throw new Error('无法识别输入格式');
            }

            // 生成所有输出格式
            const byteArray = [];
            const words = bytes.words;
            for (let i = 0; i < bytes.sigBytes; i++) {
                const byte = (words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff;
                byteArray.push(byte);
            }

            let result = `════════════════════════════════════════\n`;
            result += `检测到输入格式: ${detectedFormat}\n`;
            result += `数据长度: ${bytes.sigBytes} 字节 (${bytes.sigBytes * 8} 位)\n`;
            result += `════════════════════════════════════════\n\n`;

            // UTF-8 字符串
            if (detectedFormat !== 'UTF-8 字符串') {
                try {
                    const utf8Str = bytes.toString(CryptoJS.enc.Utf8);
                    if (utf8Str && !utf8Str.includes('\ufffd')) {
                        result += `UTF-8 字符串:\n${utf8Str}\n\n`;
                    } else {
                        result += `UTF-8 字符串:\n(包含不可打印字符)\n\n`;
                    }
                } catch (e) {
                    result += `UTF-8 字符串:\n(无法转换)\n\n`;
                }
            }

            // Hex
            if (detectedFormat !== 'Hex') {
                const hexStr = bytes.toString(CryptoJS.enc.Hex);
                result += `Hex (十六进制):\n${hexStr}\n\n`;
            }

            // Base64
            if (detectedFormat !== 'Base64') {
                const base64Str = bytes.toString(CryptoJS.enc.Base64);
                result += `Base64:\n${base64Str}\n\n`;
            }

            // Inline
            if (detectedFormat !== 'Inline') {
                const inlineStr = byteArray.map(b => `\\x${b.toString(16).padStart(2, '0')}`).join('');
                result += `Inline:\n${inlineStr}\n\n`;
            }

            // C-Array
            if (detectedFormat !== 'C-Array') {
                const cArrayItems = byteArray.map(b => `0x${b.toString(16).padStart(2, '0').toUpperCase()}`);
                const cArrayStr = `unsigned char data[] = {\n  ${cArrayItems.join(', ')}\n};`;
                result += `C-Array:\n${cArrayStr}\n\n`;
            }

            // Python
            if (detectedFormat !== 'Python List') {
                const pythonItems = byteArray.map(b => `0x${b.toString(16).padStart(2, '0').toUpperCase()}`);
                const pythonStr = `data = [\n  ${pythonItems.join(', ')}\n]`;
                result += `Python:\n${pythonStr}\n\n`;
            }

            // 字节摘要
            result += `════════════════════════════════════════\n`;
            result += `字节摘要:\n`;
            result += `前16字节: ${byteArray.slice(0, 16).map(b => b.toString(16).padStart(2, '0')).join(' ')}\n`;
            if (byteArray.length > 16) {
                result += `后16字节: ${byteArray.slice(-16).map(b => b.toString(16).padStart(2, '0')).join(' ')}\n`;
            }

            return result;
        }

        // 对称加密处理
        function processSymmetric(text, algo) {
            const keyInput = document.getElementById('keyInput')?.value || '';
            const keyFormat = document.getElementById('keyFormat')?.value || 'Utf8';
            const keySize = parseInt(document.getElementById('keySize')?.value || 256);

            // 解析密钥
            let key;
            if (keyInput) {
                key = keyFormats[keyFormat].enc.parse(keyInput);
            } else {
                key = CryptoJS.lib.WordArray.random(keySize / 8);
            }

            let result;

            // 辅助函数：尝试转换为UTF-8字符串
            function tryUtf8(wordArray) {
                try {
                    const utf8Str = wordArray.toString(CryptoJS.enc.Utf8);
                    // 检查是否是有效的UTF-8（没有乱码）
                    if (utf8Str && !utf8Str.includes('\ufffd')) {
                        return utf8Str;
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            }

            // 辅助函数：显示密钥/IV的所有格式
            function formatDisplay(name, wordArray) {
                let output = `${name}:\n`;
                const utf8Str = tryUtf8(wordArray);
                if (utf8Str) {
                    output += `  UTF-8: ${utf8Str}\n`;
                }
                output += `  Hex: ${wordArray.toString(CryptoJS.enc.Hex)}\n`;
                output += `  Base64: ${wordArray.toString(CryptoJS.enc.Base64)}\n`;
                output += `  ${t('infoBits')}: ${wordArray.sigBytes * 8} ${t('infoBits')}\n`;
                return output;
            }

            if (algo.supportsMode) {
                const cipherMode = document.getElementById('cipherMode')?.value || 'CBC';
                const paddingMode = document.getElementById('paddingMode')?.value || 'Pkcs7';
                const ivInput = document.getElementById('ivInput')?.value || '';
                const ivFormat = document.getElementById('ivFormat')?.value || 'Utf8';

                // 获取模式配置
                const modeConfig = cipherModes[cipherMode];
                const padding = CryptoJS.pad[paddingMode];

                // 解析 IV
                let iv = null;
                if (modeConfig.needsIv) {
                    if (ivInput && ivInput.trim()) {
                        // 有输入就使用自定义IV
                        iv = keyFormats[ivFormat].enc.parse(ivInput);
                    } else {
                        // 否则随机生成
                        iv = CryptoJS.lib.WordArray.random(16);
                    }
                }

                if (currentMode === 'encrypt') {
                    const cipherAlgo = CryptoJS[currentAlgo];
                    const encrypted = cipherAlgo.encrypt(text, key, {
                        iv: iv,
                        mode: CryptoJS.mode[cipherMode],
                        padding: padding
                    });

                    const ciphertext = encrypted.ciphertext;

                    result = `${t('encResult')}:\n`;
                    result += `  Base64: ${encrypted.toString()}\n`;
                    result += `  Hex: ${ciphertext.toString(CryptoJS.enc.Hex)}\n\n`;

                    result += formatDisplay(t('encKey'), key) + '\n';

                    if (modeConfig.needsIv) {
                        result += formatDisplay(t('encIV'), iv) + '\n';
                    }

                    result += `${t('encMode')}: ${cipherMode}\n`;
                    result += `${t('encPadding')}: ${paddingMode}`;

                    if (!keyInput) {
                        result += `\n\n${t('encKeyAuto')}`;
                    }
                } else {
                    const inputEncoding = document.getElementById('inputEncoding')?.value || 'Base64';
                    const outputEnc = document.getElementById('outputEncoding')?.value || 'Utf8';

                    let ciphertext;
                    if (inputEncoding === 'Base64') {
                        ciphertext = CryptoJS.enc.Base64.parse(text);
                    } else {
                        ciphertext = CryptoJS.enc.Hex.parse(text);
                    }

                    const cipherParams = CryptoJS.lib.CipherParams.create({
                        ciphertext: ciphertext
                    });

                    const decrypted = CryptoJS[currentAlgo].decrypt(cipherParams, key, {
                        iv: iv,
                        mode: CryptoJS.mode[cipherMode],
                        padding: padding
                    });

                    result = outputEnc === 'Utf8' ? decrypted.toString(CryptoJS.enc.Utf8) : decrypted.toString(CryptoJS.enc.Hex);
                }
            } else {
                // 流密码（Rabbit, RC4 等）
                if (currentMode === 'encrypt') {
                    const encrypted = CryptoJS[currentAlgo].encrypt(text, key);
                    const ciphertext = encrypted.ciphertext;

                    result = `加密结果:\n`;
                    result += `  Base64: ${encrypted.toString()}\n`;
                    result += `  Hex: ${ciphertext.toString(CryptoJS.enc.Hex)}\n\n`;

                    result += formatDisplay('密钥', key);

                    if (!keyInput) {
                        result += `\n\n⚠️ 已自动生成密钥，请妥善保存！`;
                    }
                } else {
                    const inputEncoding = document.getElementById('inputEncoding')?.value || 'Base64';
                    let ciphertext;
                    if (inputEncoding === 'Base64') {
                        ciphertext = CryptoJS.enc.Base64.parse(text);
                    } else {
                        ciphertext = CryptoJS.enc.Hex.parse(text);
                    }

                    const cipherParams = CryptoJS.lib.CipherParams.create({
                        ciphertext: ciphertext
                    });

                    const decrypted = CryptoJS[currentAlgo].decrypt(cipherParams, key);
                    const outputEnc = document.getElementById('outputEncoding')?.value || 'Utf8';

                    result = outputEnc === 'Utf8' ? decrypted.toString(CryptoJS.enc.Utf8) : decrypted.toString(CryptoJS.enc.Hex);
                }
            }

            return result;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 计算文件哈希
        async function calculateFileHash(file, algorithm) {
            // Web Crypto API 支持的算法
            const webCryptoAlgos = {
                'SHA1': 'SHA-1',
                'SHA256': 'SHA-256',
                'SHA384': 'SHA-384',
                'SHA512': 'SHA-512'
            };

            // CryptoJS 支持的算法（用于 MD5 和 SHA-224）
            const cryptoJSAlgos = {
                'MD5': CryptoJS.MD5,
                'SHA224': CryptoJS.SHA224
            };

            if (webCryptoAlgos[algorithm]) {
                // 使用 Web Crypto API（更高效）
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const buffer = e.target.result;
                            const hashBuffer = await crypto.subtle.digest(webCryptoAlgos[algorithm], buffer);
                            const hashArray = Array.from(new Uint8Array(hashBuffer));
                            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                            resolve(hashHex);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = () => reject(reader.error);
                    reader.readAsArrayBuffer(file);
                });
            } else if (cryptoJSAlgos[algorithm]) {
                // 使用 CryptoJS（支持 MD5 和 SHA-224）
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const arrayBuffer = e.target.result;
                            const wordArray = CryptoJS.lib.WordArray.create(arrayBuffer);
                            const hash = cryptoJSAlgos[algorithm](wordArray).toString();
                            resolve(hash);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = () => reject(reader.error);
                    reader.readAsArrayBuffer(file);
                });
            } else {
                throw new Error(t('hashAlgoNotSupported'));
            }
        }

        // 计算所有哈希值
        async function processAllHashes() {
            const outputBox = document.getElementById('outputBox');
            if (!outputBox) return;

            outputBox.classList.remove('error');
            outputBox.textContent = t('hashCalculating');

            const hashAlgos = ['MD5', 'SHA1', 'SHA224', 'SHA256', 'SHA384', 'SHA512'];
            const sha3Lengths = [224, 256, 384, 512];

            try {
                let results = '';

                if (currentInputType === 'file') {
                    if (!selectedFile) {
                        outputBox.textContent = t('hashSelectFile');
                        outputBox.classList.add('error');
                        return;
                    }

                    results += `${t('hashFileName')}: ${selectedFile.name}\n`;
                    results += `${t('hashFileSize')}: ${formatFileSize(selectedFile.size)}\n`;
                    results += `${'─'.repeat(50)}\n\n`;

                    // 计算基础哈希
                    for (const algo of hashAlgos) {
                        const hashHex = await calculateFileHash(selectedFile, algo);
                        results += `${algo}: ${hashHex}\n`;
                    }

                    // SHA-3 系列 (使用 CryptoJS，需要读取文件一次)
                    const reader = new FileReader();
                    const sha3Results = await new Promise((resolve, reject) => {
                        reader.onload = (e) => {
                            try {
                                const wordArray = CryptoJS.lib.WordArray.create(e.target.result);
                                const hashes = {};
                                for (const length of sha3Lengths) {
                                    hashes[length] = CryptoJS.SHA3(wordArray, { outputLength: length }).toString();
                                }
                                resolve(hashes);
                            } catch (err) {
                                reject(err);
                            }
                        };
                        reader.onerror = () => reject(reader.error);
                        reader.readAsArrayBuffer(selectedFile);
                    });
                    for (const length of sha3Lengths) {
                        results += `SHA3-${length}: ${sha3Results[length]}\n`;
                    }
                } else {
                    const inputTextEl = document.getElementById('inputText');
                    if (!inputTextEl || !inputTextEl.value.trim()) {
                        outputBox.textContent = '请输入文本';
                        outputBox.classList.add('error');
                        return;
                    }

                    const text = inputTextEl.value;

                    // 计算基础哈希
                    for (const algo of hashAlgos) {
                        const hashHex = CryptoJS[algo](text).toString();
                        results += `${algo}: ${hashHex}\n`;
                    }

                    // SHA-3 系列
                    for (const length of sha3Lengths) {
                        const sha3Hash = CryptoJS.SHA3(text, { outputLength: length }).toString();
                        results += `SHA3-${length}: ${sha3Hash}\n`;
                    }
                }

                outputBox.textContent = results;
            } catch (err) {
                outputBox.textContent = '错误: ' + err.message;
                outputBox.classList.add('error');
            }
        }

        // HMAC处理
        function processHMAC(text) {

                'SHA224': CryptoJS.HmacSHA224,
                'SHA256': CryptoJS.HmacSHA256,
                'SHA384': CryptoJS.HmacSHA384,
                'SHA512': CryptoJS.HmacSHA512
            };

            const hmacResult = hmacMap[hashAlgo](text, key).toString();

            return `HMAC-${hashAlgo}:\n${hmacResult}\n\n密钥格式: ${keyFormats[keyFormat].name}\n哈希算法: ${hashAlgo}`;
        }

            result += `密钥位数: ${keySize * 32} 位\n`;

        // RSA 密钥对生成
        async function generateRSAKeyPair() {

            const outputBox = document.getElementById('outputBox');

            try {

                const encryptKeyPair = await window.crypto.subtle.generateKey(

                    },

                );

                // 生成签名用的密钥对
                const signKeyPair = await window.crypto.subtle.generateKey(
                    {
                        name: "RSA-PSS",
                        modulusLength: keySize,
                        publicExponent: new Uint8Array([1, 0, 1]),
                        hash: "SHA-256"
                    },
                    true,
                    ["sign", "verify"]
                );

                // 导出 DER 数据
                const publicKeyDER = await window.crypto.subtle.exportKey('spki', encryptKeyPair.publicKey);
                const privateKeyDER = await window.crypto.subtle.exportKey('pkcs8', encryptKeyPair.privateKey);

                // 存储 DER 数据
                rsaDERData = {
                    public: new Uint8Array(publicKeyDER),
                    private: new Uint8Array(privateKeyDER)
                };

                // 导出为 PEM 格式
                const publicKeyPEM = await exportKeyToPEM(encryptKeyPair.publicKey, 'public');
                const privateKeyPEM = await exportKeyToPEM(encryptKeyPair.privateKey, 'private');

                // 保存密钥对
                rsaKeyPair = {

                };

                // 显示在输入框中（默认 PEM 格式）

                result += `${t('lblKeySizeRSA')}: ${keySize} ${t('infoBits')}\n\n`;
                result += `DER 数据长度:\n`;
                result += `  ${t('lblPublicKey')}: ${rsaDERData.public.length} 字节\n`;
                result += `  ${t('lblPrivateKey')}: ${rsaDERData.private.length} 字节\n\n`;
                result += `${t('rsaSameKeyParams')}`;

                outputBox.textContent = result;
                outputBox.classList.remove('error');
                showToast(t('rsaKeyGenerated'));

                outputBox.textContent = '错误: ' + err.message;

        // PEM 导出
        async function exportKeyToPEM(key, type) {
            const exported = await window.crypto.subtle.exportKey(
                type === 'public' ? 'spki' : 'pkcs8',
                key
            );
            const base64 = btoa(String.fromCharCode(...new Uint8Array(exported)));
            const pemType = type === 'public' ? 'PUBLIC' : 'PRIVATE';
            // 将 Base64 分行显示（每行 64 字符）
            const formattedBase64 = base64.match(/.{1,64}/g).join('\n');
            return `-----BEGIN ${pemType} KEY-----\n${formattedBase64}\n-----END ${pemType} KEY-----`;
        }

        // PEM 转 DER
        function pemToDer(pem) {
            const base64 = pem
                .replace(/-----[\w\s]+KEY-----/g, '')
                .replace(/\s/g, '');
            return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        }

        // DER 转 PEM
        function derToPem(der, type) {
            const base64 = btoa(String.fromCharCode(...der));
            const formattedBase64 = base64.match(/.{1,64}/g).join('\n');
            const pemType = type === 'public' ? 'PUBLIC' : 'PRIVATE';
            return `-----BEGIN ${pemType} KEY-----\n${formattedBase64}\n-----END ${pemType} KEY-----`;
        }

        // DER 转 Hex
        function derToHex(der) {
            return Array.from(der).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Hex 转 DER
        function hexToDer(hex) {
            const bytes = [];
            for (let i = 0; i < hex.length; i += 2) {
                bytes.push(parseInt(hex.substr(i, 2), 16));
            }
            return new Uint8Array(bytes);
        }

        // Base64 转 DER
        function base64ToDer(base64) {
            return Uint8Array.from(atob(base64.replace(/\s/g, '')), c => c.charCodeAt(0));
        }

        // DER 转 Base64
        function derToBase64(der) {
            return btoa(String.fromCharCode(...der));
        }

        // RSA 密钥格式转换
        function convertRSAKeyFormat(type) {
            const textarea = document.getElementById(type === 'public' ? 'rsaPublicKey' : 'rsaPrivateKey');
            const formatSelect = document.getElementById(type === 'public' ? 'rsaPublicKeyFormat' : 'rsaPrivateKeyFormat');
            const currentFormat = formatSelect?.value || 'PEM';
            const currentValue = textarea?.value || '';

            if (!currentValue.trim()) return;

            try {
                let der;

                // 先转换为 DER（中间格式）
                if (currentValue.includes('-----BEGIN')) {
                    // 当前是 PEM 格式
                    der = pemToDer(currentValue);
                    rsaDERData[type] = der; // 存储 DER 数据
                } else if (/^[0-9a-fA-F]+$/.test(currentValue.replace(/\s/g, ''))) {
                    // 当前是 Hex 格式
                    der = hexToDer(currentValue.replace(/\s/g, ''));
                    rsaDERData[type] = der;
                } else {
                    // 当前是 Base64 格式
                    der = base64ToDer(currentValue);
                    rsaDERData[type] = der;
                }

                // 转换为目标格式
                let result;
                switch (currentFormat) {
                    case 'PEM':
                        result = derToPem(der, type);
                        break;
                    case 'DER':
                        result = derToHex(der);
                        break;
                    case 'Base64':
                        result = derToBase64(der);
                        break;
                    default:
                        result = derToPem(der, type);
                }

                textarea.value = result;
            } catch (err) {
                showToast(t('rsaConvertError') + ': ' + err.message);
            }
        }

        // PEM 转 DER 转换按钮
        // 密钥导入（支持 PEM、DER/Hex、Base64 格式）
        async function importKeyFromPEM(keyData, type, algorithm) {
            let binary;

            // 检测格式并转换为 DER
            if (keyData.includes('-----BEGIN')) {
                // PEM 格式
                const base64 = keyData
                    .replace(/-----[\w\s]+KEY-----/g, '')
                    .replace(/\s/g, '');
                binary = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
            } else if (/^[0-9a-fA-F]+$/.test(keyData.replace(/\s/g, ''))) {
                // Hex/DER 格式
                const hex = keyData.replace(/\s/g, '');
                binary = hexToDer(hex);
            } else {
                // Base64 格式
                binary = Uint8Array.from(atob(keyData.replace(/\s/g, '')), c => c.charCodeAt(0));
            }

            // 存储 DER 数据
            rsaDERData[type] = binary;

            const keyUsages = type === 'public'
                ? (algorithm.name === 'RSA-OAEP' ? ['encrypt'] : ['verify'])
                : (algorithm.name === 'RSA-OAEP' ? ['decrypt'] : ['sign']);

            return await window.crypto.subtle.importKey(
                type === 'public' ? 'spki' : 'pkcs8',
                binary,
                algorithm,
                true,
                keyUsages
            );
        }

        // RSA 加密
        async function rsaEncrypt(text, publicKey) {
            const encoded = new TextEncoder().encode(text);

            // 检查数据长度限制
            const keySize = publicKey.algorithm.modulusLength;
            const maxDataSize = Math.floor((keySize / 8) - 2 * 32 - 2); // SHA-256 hash = 32 bytes
            if (encoded.length > maxDataSize) {
                throw new Error(t('rsaDataTooLarge') + ` (最大 ${maxDataSize} 字节)`);
            }

            const encrypted = await window.crypto.subtle.encrypt(
                { name: "RSA-OAEP" },
                publicKey,
                encoded
            );
            return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
        }

        // RSA 解密
        async function rsaDecrypt(ciphertext, privateKey) {
            const binary = Uint8Array.from(atob(ciphertext), c => c.charCodeAt(0));
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "RSA-OAEP" },
                privateKey,
                binary
            );
            return new TextDecoder().decode(decrypted);
        }

        // RSA 签名
        async function rsaSign(text, privateKey) {
            const encoded = new TextEncoder().encode(text);
            const signature = await window.crypto.subtle.sign(
                {
                    name: "RSA-PSS",
                    saltLength: 32
                },
                privateKey,
                encoded
            );
            return btoa(String.fromCharCode(...new Uint8Array(signature)));
        }

        // RSA 验证
        async function rsaVerify(text, signature, publicKey) {
            const encoded = new TextEncoder().encode(text);
            const sigBinary = Uint8Array.from(atob(signature), c => c.charCodeAt(0));
            return await window.crypto.subtle.verify(
                {
                    name: "RSA-PSS",
                    saltLength: 32
                },
                publicKey,
                sigBinary,
                encoded
            );
        }

        // RSA 处理函数
        async function processRSA(inputText) {
            const rsaModeSelect = document.getElementById('rsaMode');
            const currentRSAMode = rsaModeSelect?.value || 'encrypt';
            const publicKeyPEM = document.getElementById('rsaPublicKey')?.value || '';
            const privateKeyPEM = document.getElementById('rsaPrivateKey')?.value || '';

            if (!publicKeyPEM.trim() && !privateKeyPEM.trim()) {
                throw new Error(t('rsaKeyGenWarning'));
            }

            let result = '';

            if (currentRSAMode === 'encrypt') {
                if (currentMode === 'encrypt') {
                    // 加密
                    const publicKey = await importKeyFromPEM(publicKeyPEM, 'public', {
                        name: "RSA-OAEP",
                        hash: "SHA-256"
                    });
                    const ciphertext = await rsaEncrypt(inputText, publicKey);
                    result = `${t('encResult')}:\n${ciphertext}\n\n`;
                    result += `${t('lblKeySizeRSA')}: ${publicKey.algorithm.modulusLength} ${t('infoBits')}`;
                } else {
                    // 解密
                    const privateKey = await importKeyFromPEM(privateKeyPEM, 'private', {
                        name: "RSA-OAEP",
                        hash: "SHA-256"
                    });
                    const plaintext = await rsaDecrypt(inputText, privateKey);
                    result = plaintext;
                }
            } else {
                // 签名/验证模式
                if (currentMode === 'encrypt') {
                    // 签名
                    const privateKey = await importKeyFromPEM(privateKeyPEM, 'private', {
                        name: "RSA-PSS",
                        hash: "SHA-256"
                    });
                    const signature = await rsaSign(inputText, privateKey);
                    result = `${t('lblSignature')}:\n${signature}\n\n`;
                    result += `${t('rsaSignSuccess')}\n\n`;
                    result += `${t('lblKeySizeRSA')}: ${privateKey.algorithm.modulusLength} ${t('infoBits')}`;
                } else {
                    // 验证
                    const signatureInput = document.getElementById('rsaSignature')?.value || '';
                    if (!signatureInput.trim()) {
                        throw new Error(t('rsaNoSignature'));
                    }
                    const publicKey = await importKeyFromPEM(publicKeyPEM, 'public', {
                        name: "RSA-PSS",
                        hash: "SHA-256"
                    });
                    const isValid = await rsaVerify(inputText, signatureInput, publicKey);
                    result = isValid ? t('rsaVerifySuccess') : t('rsaVerifyFailed');
                }
            }

            return result;
        }

        // 导入 EC 密钥

                ? (algorithm.name === 'ECDSA' ? ['verify'] : [])
                : (algorithm.name === 'ECDSA' ? ['sign'] : ['deriveKey', 'deriveBits']);

            return await window.crypto.subtle.verify(

                },

        // ===================== ECDH 相关函数 =====================

        // 处理 ECDH
        async function processECDH(inputText) {
            const privateKeyJWK = document.getElementById('ecPrivateKey')?.value || '';
            const otherPublicKeyJWK = document.getElementById('ecOtherPublicKey')?.value || '';
            const curve = document.getElementById('ecCurve')?.value || 'P-256';

            if (!privateKeyJWK.trim() || !otherPublicKeyJWK.trim()) {
                throw new Error(t('rsaKeyGenWarning'));
            }

            try {
                // 导入私钥
                const privateKey = await importECKey(privateKeyJWK, 'private', {
                    name: 'ECDH',
                    namedCurve: curve
                });

                // 导入对方的公钥
                const otherPublicKey = await window.crypto.subtle.importKey(
                    'jwk',
                    JSON.parse(otherPublicKeyJWK),
                    { name: 'ECDH', namedCurve: curve },
                    true,
                    []
                );

                // 派生共享密钥
                const sharedKey = await window.crypto.subtle.deriveKey(
                    {
                        name: 'ECDH',
                        public: otherPublicKey
                    },
                    privateKey,
                    { name: 'AES-GCM', length: 256 },
                    true,
                    ['encrypt', 'decrypt']
                );

                // 导出共享密钥
                const rawKey = await window.crypto.subtle.exportKey('raw', sharedKey);
                const sharedKeyHex = Array.from(new Uint8Array(rawKey))
                    .map(b => b.toString(16).padStart(2, '0')).join('');

                let result = `${t('lblSharedSecret')}:\n`;
                result += `Hex: ${sharedKeyHex}\n`;
                result += `Base64: ${btoa(String.fromCharCode(...new Uint8Array(rawKey)))}\n\n`;
                result += `${t('lblECCurve')}: ${curve}\n`;
                result += `${t('lblDerivedKeySize')}: 256 ${t('infoBits')} (AES-GCM)`;

                return result;
            } catch (err) {
                throw new Error(t('ecDeriveError') + ': ' + err.message);
            }
        }
