                document.getElementById('edPrivateKey').value = JSON.stringify(privateKeyJWK, null, 2);

                let result = `${t('ecKeyGenerated')}\n`;
                result += `算法: Ed25519\n`;
                result += `${t('lblPublicKey')}: ${publicKeyJWK.x?.substring(0, 20)}...\n`;

                outputBox.textContent = result;
                outputBox.classList.remove('error');
                showToast(t('ecKeyGenerated'));
            } catch (err) {
                outputBox.textContent = '错误: ' + err.message;
                outputBox.classList.add('error');
            }
        }

        // 导入 Ed25519 密钥
        async function importEd25519Key(jwkStr, type) {
            const jwk = JSON.parse(jwkStr);
            const usages = type === 'public' ? ['verify'] : ['sign'];

            return await window.crypto.subtle.importKey(
                'jwk',
                jwk,
                'Ed25519',
                true,
                usages
            );
        }

        // Ed25519 签名
        async function ed25519Sign(text, privateKey) {
            const encoded = new TextEncoder().encode(text);
            const signature = await window.crypto.subtle.sign(
                'Ed25519',
                privateKey,
                encoded
            );
            return btoa(String.fromCharCode(...new Uint8Array(signature)));
        }

        // Ed25519 验证
        async function ed25519Verify(text, signature, publicKey) {
            const encoded = new TextEncoder().encode(text);
            const sigBinary = Uint8Array.from(atob(signature), c => c.charCodeAt(0));
            return await window.crypto.subtle.verify(
                'Ed25519',
                publicKey,
                sigBinary,
                encoded
            );
        }

        // 处理 Ed25519
        async function processEd25519(inputText) {
            const publicKeyJWK = document.getElementById('edPublicKey')?.value || '';
            const privateKeyJWK = document.getElementById('edPrivateKey')?.value || '';

            if (!publicKeyJWK.trim() && !privateKeyJWK.trim()) {
                throw new Error(t('rsaKeyGenWarning'));
            }

            let result = '';

            if (currentMode === 'encrypt') {
                // 签名
                const privateKey = await importEd25519Key(privateKeyJWK, 'private');
                const signature = await ed25519Sign(inputText, privateKey);
                result = `${t('lblSignature')}:\n${signature}\n\n`;
                result += `${t('rsaSignSuccess')}`;
            } else {
                // 验证
                const signatureInput = document.getElementById('edSignature')?.value || '';
                if (!signatureInput.trim()) {
                    throw new Error(t('rsaNoSignature'));
                }
                const publicKey = await importEd25519Key(publicKeyJWK, 'public');
                const isValid = await ed25519Verify(inputText, signatureInput, publicKey);
                result = isValid ? t('rsaVerifySuccess') : t('rsaVerifyFailed');
            }

            return result;
        }

        // 复制结果
        function copyOutput() {
            const outputBox = document.getElementById('outputBox');
            const text = outputBox.textContent;

            if (!text) {
                showToast('没有可复制的内容');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板');
            });
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            if (newTheme === 'dark') {
                html.removeAttribute('data-theme');
            } else {
                html.setAttribute('data-theme', 'light');
            }

            localStorage.setItem('theme', newTheme === 'light' ? 'light' : 'dark');
            document.getElementById('theme-icon').textContent = newTheme === 'dark' ? '☀️' : '🌙';
            showToast(newTheme === 'light' ? t('toastThemeLight') : t('toastThemeDark'));
        }

        // 语言切换
        function toggleLanguage() {
            const html = document.documentElement;
            const currentLang = html.getAttribute('data-lang') || 'zh';
            const newLang = currentLang === 'zh' ? 'en' : 'zh';

            html.setAttribute('data-lang', newLang);
            localStorage.setItem('language', newLang);
            window.__initialLang = newLang;
            document.getElementById('lang-icon').textContent = newLang === 'zh' ? 'EN' : '中';

            updateStaticText();
            renderWorkspace(currentAlgo);
            showToast(newLang === 'en' ? t('toastLangEn') : t('toastLangZh'));
        }

        // 更新静态文本
        function updateStaticText() {
            // 更新页面标题
            document.getElementById('pageTitle').textContent = t('title');
            document.getElementById('pageSubtitle').textContent = t('subtitle');

            // 更新分类标题
            document.getElementById('catSymmetric').textContent = t('catSymmetric');
            document.getElementById('catAsymmetric').textContent = t('catAsymmetric');
            document.getElementById('catHash').textContent = t('catHash');
            document.getElementById('catHMAC').textContent = t('catHMAC');
            document.getElementById('catEncoding').textContent = t('catEncoding');
            document.getElementById('catKDF').textContent = t('catKDF');

            // 更新按钮文本
            document.getElementById('btnUniversalConvert').textContent = t('universalTitle');
            document.getElementById('btnHexEncode').textContent = t('formatHexShort') + ' ' + t('catEncoding');
            document.getElementById('btnUtf8Encode').textContent = 'UTF-8 ' + t('catEncoding');

            // 更新footer
            document.getElementById('footerText').innerHTML = t('footer') + ' <a href="https://github.com/brix/crypto-js" target="_blank">Crypto.js</a> & Web Crypto API';
        }
    </script>
